name: Broadcast Status

on:
  workflow_dispatch:
    inputs:
      status:
        description: "Manual override (auto-detection resumes after 4 hours)"
        required: true
        type: choice
        options:
          - live
          - off
        default: live
      video:
        description: "Optional: live watch URL or 11-char video ID"
        required: false
        default: ""
      title:
        description: "Optional: stream title shown under the player"
        required: false
        default: ""
  schedule:
    # Auto-check live status every 5 minutes (GitHub may delay runs 5-20 min)
    - cron: "*/5 * * * *"
    # Fridays at 19:00 UTC = 12:00 PM Arizona (AZ has no DST) — refresh the latest episode
    - cron: "0 19 * * 5"

permissions:
  contents: write
  pages: write

concurrency:
  group: broadcast-status
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update status.json
        env:
          EVENT: ${{ github.event_name }}
          STATUS: ${{ inputs.status }}
          VIDEO: ${{ inputs.video }}
          TITLE: ${{ inputs.title }}
        run: |
          python3 - <<'EOF'
          import json, os, re, copy, html as htmllib, urllib.request
          import xml.etree.ElementTree as ET
          from datetime import datetime, timezone, timedelta

          PATH = "status.json"
          CHANNEL_ID = "UCWQG8OvkNCZ3405ZMXgZ3dA"
          CHANNEL_HANDLE = "bashabearnetwork"
          VALID_ID = re.compile(r"^[A-Za-z0-9_-]{11}$")
          OVERRIDE_HOURS = 4     # manual trigger blocks auto-detection this long
          HEARTBEAT_DAYS = 20    # commit at least this often so GitHub never
                                 # disables the schedule for repo inactivity

          def now_utc():
              return datetime.now(timezone.utc)

          def parse_iso(s):
              try:
                  return datetime.fromisoformat(s)
              except Exception:
                  return None

          try:
              with open(PATH) as f:
                  status = json.load(f)
          except Exception:
              status = {}

          status.setdefault("live", False)
          status.setdefault("videoId", "")
          status.setdefault("title", "")
          status.setdefault("latestEpisode", {})
          status.setdefault("manualUntil", "")
          before = copy.deepcopy(status)

          # ── Fetch the channel uploads RSS feed (title lookup + latest episode) ──
          entries = []
          try:
              feed = urllib.request.urlopen(
                  "https://www.youtube.com/feeds/videos.xml?channel_id=" + CHANNEL_ID,
                  timeout=20,
              ).read()
              ns = {
                  "a": "http://www.w3.org/2005/Atom",
                  "yt": "http://www.youtube.com/xml/schemas/2015",
              }
              for e in ET.fromstring(feed).findall("a:entry", ns):
                  entries.append({
                      "videoId": (e.findtext("yt:videoId", "", ns) or "").strip(),
                      "title": (e.findtext("a:title", "", ns) or "").strip(),
                      "published": (e.findtext("a:published", "", ns) or "").strip(),
                  })
          except Exception as ex:
              print("RSS fetch failed:", ex)

          if os.environ.get("EVENT") == "workflow_dispatch":
              # ── Manual trigger: set state and block auto-detection for a while ──
              is_live = os.environ.get("STATUS", "off") == "live"
              status["live"] = is_live
              status["manualUntil"] = (now_utc() + timedelta(hours=OVERRIDE_HOURS)).isoformat()
              title_in = os.environ.get("TITLE", "").strip()

              vid = ""
              raw = os.environ.get("VIDEO", "").strip()
              if raw:
                  m = re.search(r"(?:v=|youtu\.be/|/live/|/embed/)([A-Za-z0-9_-]{11})", raw)
                  if m:
                      vid = m.group(1)
                  elif VALID_ID.match(raw):
                      vid = raw

              # No usable URL/ID but a title was given → find it in the feed
              matched_title = ""
              if is_live and not vid and title_in:
                  needle = re.sub(r"\s+", " ", title_in).lower()
                  for e in entries:
                      hay = re.sub(r"\s+", " ", e["title"]).lower()
                      if needle in hay and VALID_ID.match(e["videoId"]):
                          vid = e["videoId"]
                          matched_title = e["title"]
                          print("Title match:", e["title"], "->", vid)
                          break
                  if not vid:
                      print("No title match in feed — falling back to channel live embed.")

              status["videoId"] = vid if is_live else ""
              status["title"] = (matched_title or title_in)[:200] if is_live else ""

          else:
              # ── Scheduled run: auto-detect live status from the /live page ──
              override = parse_iso(status.get("manualUntil", ""))
              if override and now_utc() < override:
                  print("Manual override active until", status["manualUntil"], "— skipping auto-detection.")
              else:
                  try:
                      req = urllib.request.Request(
                          "https://www.youtube.com/@" + CHANNEL_HANDLE + "/live",
                          headers={
                              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
                                            "AppleWebKit/537.36 (KHTML, like Gecko) "
                                            "Chrome/126.0.0.0 Safari/537.36",
                              "Accept-Language": "en-US,en;q=0.9",
                          },
                      )
                      page = urllib.request.urlopen(req, timeout=25).read().decode("utf-8", "replace")

                      if "ytInitialData" not in page and "ytInitialPlayerResponse" not in page:
                          # Consent wall / bot check — not a real page, keep previous state
                          print("Got a non-standard page (likely bot check) — keeping previous state.")
                      elif '"isLiveNow":true' in page:
                          vid, title = "", ""
                          m = re.search(r'<link rel="canonical" href="https://www\.youtube\.com/watch\?v=([^"&]+)"', page)
                          if m and VALID_ID.match(m.group(1)):
                              vid = m.group(1)
                          t = re.search(r'<meta property="og:title" content="([^"]*)"', page)
                          if t:
                              title = htmllib.unescape(t.group(1)).strip()[:200]
                          status["live"] = True
                          status["videoId"] = vid
                          status["title"] = title
                          print("LIVE detected:", vid, title)
                      else:
                          status["live"] = False
                          status["videoId"] = ""
                          status["title"] = ""
                          print("Not live.")
                  except Exception as ex:
                      print("Live check failed — keeping previous state:", ex)

          # ── Refresh latest episode ──
          if entries:
              eps = [e for e in entries if re.search(r"basha bear (network|news) episode", e["title"], re.I)]
              if not eps:
                  eps = [e for e in entries if re.search(r"episode", e["title"], re.I)]
              if not eps:
                  eps = entries
              eps.sort(key=lambda e: e["published"], reverse=True)
              if eps and VALID_ID.match(eps[0]["videoId"]):
                  status["latestEpisode"] = eps[0]

          # ── Heartbeat: force a commit occasionally so the schedule never gets
          #    disabled for repo inactivity ──
          last = parse_iso(status.get("updated", ""))
          stale = (not last) or (now_utc() - last > timedelta(days=HEARTBEAT_DAYS))

          if status == before and not stale:
              print("No changes — skipping write.")
          else:
              status["updated"] = now_utc().isoformat()
              with open(PATH, "w") as f:
                  json.dump(status, f, indent=2)
              print(json.dumps(status, indent=2))
          EOF

      - name: Commit and push
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add status.json
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update broadcast status"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Pages rebuild
        if: steps.commit.outputs.pushed == 'true'
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pages/builds
